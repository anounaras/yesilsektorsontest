<!DOCTYPE html>
<html lang="tr">
<head>

    <title>İletişim</title>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Raleway:wght@400;600;700&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            height: 100%;
        }

        body {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            font-family: "Raleway", sans-serif;
            background-color: #003724;
        }

        .navbar {
            width: 100%;
            padding: 20px 0;
            background: #1b1b1b; /* hafif cam efekti */
            backdrop-filter: blur(10px);
            position: relative;
            top: 0;
            z-index: 1000;
        }
        .navbar {
            position: fixed;
            top: 0;
            width: 100%;
            padding: 20px 0;
            background: #1b1b1b;
            backdrop-filter: blur(10px);
            z-index: 1000;
            transition: top 0.3s; /* burada menü kayarken yumuşak hareket */
        }

        .nav-container {
            width: 85%;
            margin: auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        /* Logo */
        .logo img {
            width: 80px;
            height: auto;
        }

        /* Menü */
        .menu {
            display: flex;
            gap: 40px;
        }

        .menu a {
            color: white;
            text-decoration: none;
            font-size: 16px;
            position: relative;
            transition: 0.3s;
        }

        /* İnce premium alt çizgi */
        .menu a::after {
            content: "";
            position: absolute;
            width: 0%;
            height: 2px;
            background: #003724;
            left: 0;
            bottom: -6px;
            transition: 0.3s ease;
        }

        .menu a:hover::after {
            width: 100%;
        }

        .menu a:hover {
            color: yellowgreen;
        }
        .nav-container {
        display: grid;
        grid-template-columns: 1fr auto 1fr;
        align-items: center;
        }

        .logo {
                justify-self: center;
        }

        .menu{
                justify-self: end;
         }



        .progress {
        position: fixed;
        top: 0;
        left: 0;
        height: 4px;
        background: #026643;
        width: 0%;
        z-index: 9999;
        }
        /* ÜST BAR */
        .canban {
            width: 100%;
            height: 80px;
            background-color: #1f1f1f;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Tüm sayfalarda içeriği navbar'ın altından başlatır */
        body.iletisim {
            padding-top: 120px !important;
        }

        /* --- İLETİŞİM FORMU --- */
        .form-container {
            max-width: 900px;
            margin: 60px auto 200px auto; 
            padding: 50px 60px;
            border-radius: 25px;
            background: rgba(0, 45, 30, 0.85); 
            backdrop-filter: blur(12px); 
            box-shadow: 0 12px 35px rgba(0,0,0,0.7);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .form-container:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 45px rgba(0,0,0,0.8), 0 0 25px rgba(0,255,0,0.2);
        }

        .form-container h2 {
            text-align: center;
            color: yellowgreen;
            font-size: 36px;
            font-weight: 800;
            margin-bottom: 40px;
            text-shadow: 0 0 2px yellowgreen;
            letter-spacing: 1.2px;
        }

        .form-row {
            display: flex;
            gap: 25px;
            margin-bottom: 25px;
        }

        .form-group {
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .form-container label {
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            margin-bottom: 10px;
            font-weight: 700;
            color: yellowgreen;
            text-transform: uppercase;
            letter-spacing: 0.8px;
        }

        /* Border kaldırıldı */
        .form-container input,
        .form-container textarea {
            width: 100%;
            padding: 16px;
            box-sizing: border-box; 
            margin-bottom: 20px;
            border-radius: 15px;
            border: none; /* Kenarlık yok */
            background: rgba(27,27,27,0.6);
            color: #ffffff;
            font-size: 16px;
            backdrop-filter: blur(6px);
            box-shadow: inset 0 2px 6px rgba(0,0,0,0.4);
            transition: background 0.3s, box-shadow 0.3s;
        }

        /* Focus olunca sadece yeşil parlama yapar */
        .form-container input:focus,
        .form-container textarea:focus {
            border: none;
            outline: none;
            background: rgba(0,30,20,0.8);
            box-shadow: 0 0 10px yellowgreen;
        }

        .form-container button {
            width: 100%;
            padding: 18px;
            font-size: 20px;
            font-weight: 800;
            border: none;
            border-radius: 18px;
            background: linear-gradient(135deg, yellowgreen, #88ff55);
            color: #002d1e;
            cursor: pointer;
            box-shadow: 0 0px 5px rgba(0,255,0,0.4);
            transition: transform 0.2s, box-shadow 0.3s, background 0.3s;
        }

        .form-container button:hover {
            transform: scale(1.05);
            box-shadow: 0 0px 1px rgba(0,255,0,0.6);
            background: linear-gradient(135deg, #a4e500, #77ee44);
        }

        /* --- MOBİL UYUMLULUK --- */
        @media (max-width: 768px) {
            .nav-container {
                display: flex;
                flex-direction: column;
                gap: 15px;
                width: 100%;
                padding: 10px;
            }

            .logo {
                justify-self: auto;
            }

            .menu {
                justify-self: auto;
                gap: 10px;
                flex-wrap: wrap; 
                justify-content: center;
            }

            .menu a {
                font-size: 13px;
                padding: 5px 8px;
            }

            .form-container {
                margin: 20px 15px 100px 15px; 
                padding: 30px 20px;
            }

            .form-container h2 {
                font-size: 24px;
            }

            .form-row {
                flex-direction: column;
                gap: 0;
            }

            .footer-container {
                width: 95%;
                padding: 40px 20px;
                border-radius: 30px 30px 0 0;
            }

            .footer-columns {
                flex-direction: column;
                align-items: center;
                text-align: center;
                gap: 40px; 
            }

            .col {
                width: 100%;
            }

            .footer-logo {
                margin-bottom: 40px;
            }

            .bosluk {
                height: 80px !important;
            }
        }
        @media (max-width: 768px) {
    /* Navbar ve Menü Düzenlemesi */
    .nav-container {
        display: flex; /* Grid'den Flex'e dönerek sıkışmayı önler */
        flex-direction: column;
        gap: 15px;
        width: 100%;
        padding: 10px;
    }

    .logo {
        justify-self: auto;
    }

    .menu {
        justify-self: auto;
        gap: 10px;
        flex-wrap: wrap; /* Menü linkleri sığmazsa alt satıra geçer */
        justify-content: center;
    }

    .menu a {
        font-size: 13px;
        padding: 5px 8px;
    }
}
.navbar {
    transition: transform 0.4s ease;
}
    </style>

<script src="script.js">
let lastScroll = 0;
const navbar = document.querySelector(".navbar");

window.addEventListener("scroll", () => {
    const currentScroll = window.pageYOffset;

    // en üstteyse hep açık kalsın
    if (currentScroll <= 0) {
        navbar.style.transform = "translateY(0)";
        return;
    }

    if (currentScroll > lastScroll) {
        // aşağı scroll → gizle
        navbar.style.transform = "translateY(-100%)";
    } else {
        // yukarı scroll → göster
        navbar.style.transform = "translateY(0)";
    }

    lastScroll = currentScroll;
});
</script>
